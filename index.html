<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CinePick 🎬</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'DM Sans',sans-serif;
  background:#0a0a0a;
  color:#fff;
  min-height:100vh;
  overflow-x:hidden;
}

/* ── HEADER ── */
.header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:20px 28px;
  position:sticky;
  top:0;
  z-index:100;
  background:linear-gradient(to bottom,#0a0a0a 80%,transparent);
}
.logo{
  font-size:1.5rem;
  font-weight:700;
  letter-spacing:-0.5px;
}
.logo span{color:#e50914}
.header-tag{
  font-size:.7rem;
  font-weight:600;
  letter-spacing:2px;
  text-transform:uppercase;
  color:#555;
  border:1px solid #222;
  padding:5px 12px;
  border-radius:20px;
}

/* ── HERO ── */
.hero{
  text-align:center;
  padding:40px 24px 32px;
}
.hero-emoji{
  font-size:3rem;
  margin-bottom:12px;
  display:block;
  animation:float 3s ease-in-out infinite;
}
@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-8px)}
}
.hero h1{
  font-size:clamp(2rem,8vw,3.2rem);
  font-weight:700;
  line-height:1.1;
  letter-spacing:-1px;
  margin-bottom:10px;
}
.hero h1 em{
  color:#e50914;
  font-style:normal;
  position:relative;
}
.hero p{
  font-size:.95rem;
  color:#666;
  font-weight:400;
  line-height:1.6;
  max-width:300px;
  margin:0 auto;
}

/* ── CONTROLS ── */
.controls{
  padding:0 20px 24px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:12px;
  max-width:420px;
  margin:0 auto;
}

.toggle-row{
  display:flex;
  background:#161616;
  border:1px solid #1f1f1f;
  border-radius:12px;
  padding:4px;
  gap:4px;
  width:100%;
}
.tog{
  flex:1;
  font-family:'DM Sans',sans-serif;
  font-size:.78rem;
  font-weight:600;
  background:transparent;
  color:#555;
  border:none;
  border-radius:9px;
  padding:10px 8px;
  cursor:pointer;
  transition:all .2s;
}
.tog.on{
  background:#e50914;
  color:#fff;
  box-shadow:0 4px 20px rgba(229,9,20,.4);
}
.tog:not(.on):hover{color:#aaa}

.genre-wrap{width:100%;position:relative}
.genre-wrap::after{
  content:'▾';
  position:absolute;right:14px;top:50%;
  transform:translateY(-50%);
  color:#555;font-size:.8rem;
  pointer-events:none;
}
select{
  width:100%;
  font-family:'DM Sans',sans-serif;
  font-size:.82rem;
  font-weight:500;
  background:#161616;
  color:#888;
  border:1px solid #1f1f1f;
  border-radius:12px;
  padding:13px 36px 13px 16px;
  cursor:pointer;
  outline:none;
  appearance:none;
  -webkit-appearance:none;
  transition:border-color .2s,color .2s;
}
select:focus,select:hover{border-color:#333;color:#fff}
select option{background:#161616}

/* ── MAIN BUTTON ── */
.pick-btn{
  width:100%;
  font-family:'DM Sans',sans-serif;
  font-size:1rem;
  font-weight:700;
  letter-spacing:.3px;
  background:#e50914;
  color:#fff;
  border:none;
  border-radius:14px;
  padding:17px;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  transition:transform .15s,box-shadow .2s;
  -webkit-tap-highlight-color:transparent;
  box-shadow:0 8px 32px rgba(229,9,20,.35);
}
.pick-btn::after{
  content:'';
  position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.18) 0%,transparent 60%);
  opacity:0;
  transition:opacity .2s;
}
.pick-btn:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(229,9,20,.5)}
.pick-btn:hover::after{opacity:1}
.pick-btn:active{transform:scale(.97)}
.pick-btn-inner{display:flex;align-items:center;justify-content:center;gap:10px}
.pick-dice{display:inline-block;animation:shake 2.5s ease infinite}
@keyframes shake{
  0%,80%,100%{transform:rotate(0)}
  85%{transform:rotate(-18deg)}
  92%{transform:rotate(18deg)}
}

/* ── LOADER ── */
.loader{
  display:none;
  text-align:center;
  padding:48px 20px;
}
.loader-dots{
  display:flex;justify-content:center;gap:6px;margin-bottom:14px;
}
.loader-dots span{
  width:8px;height:8px;
  background:#e50914;border-radius:50%;
  animation:dotBounce .8s ease-in-out infinite alternate;
}
.loader-dots span:nth-child(2){animation-delay:.15s}
.loader-dots span:nth-child(3){animation-delay:.3s}
@keyframes dotBounce{
  from{transform:translateY(0);opacity:.3}
  to{transform:translateY(-10px);opacity:1}
}
.loader p{font-size:.8rem;color:#555;letter-spacing:1px;text-transform:uppercase;font-weight:600}

/* ── CARD ── */
.card-wrap{
  padding:0 20px 40px;
  max-width:420px;
  margin:0 auto;
}

.card{
  display:none;
  border-radius:20px;
  overflow:hidden;
  background:#141414;
  border:1px solid #1f1f1f;
  animation:cardIn .4s cubic-bezier(0.16,1,0.3,1) both;
  box-shadow:0 24px 64px rgba(0,0,0,.6);
}
@keyframes cardIn{
  from{opacity:0;transform:translateY(24px) scale(.97)}
  to{opacity:1;transform:translateY(0) scale(1)}
}

/* Poster */
.poster-wrap{
  position:relative;
  width:100%;
  aspect-ratio:2/3;
  overflow:hidden;
}
.poster-wrap img{
  width:100%;height:100%;
  object-fit:cover;
  display:block;
  transition:transform .6s ease;
}
.card:hover .poster-wrap img{transform:scale(1.03)}
.poster-gradient{
  position:absolute;
  bottom:0;left:0;right:0;
  height:65%;
  background:linear-gradient(to top,#141414 0%,rgba(20,20,20,.7) 50%,transparent 100%);
}
.poster-badge{
  position:absolute;
  top:14px;left:14px;
  background:rgba(0,0,0,.75);
  backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.1);
  border-radius:8px;
  padding:5px 10px;
  font-size:.68rem;
  font-weight:700;
  letter-spacing:1.5px;
  text-transform:uppercase;
  color:#e50914;
}
.poster-rating{
  position:absolute;
  top:14px;right:14px;
  background:rgba(0,0,0,.75);
  backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.1);
  border-radius:8px;
  padding:5px 10px;
  font-size:.75rem;
  font-weight:700;
  color:#FFD60A;
}

/* Info over poster */
.poster-info{
  position:absolute;
  bottom:0;left:0;right:0;
  padding:20px 18px 18px;
}
.poster-title{
  font-size:1.4rem;
  font-weight:700;
  letter-spacing:-.3px;
  line-height:1.15;
  margin-bottom:8px;
  text-shadow:0 2px 8px rgba(0,0,0,.8);
}
.poster-tags{
  display:flex;flex-wrap:wrap;gap:5px;
}
.tag{
  background:rgba(255,255,255,.12);
  backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.15);
  padding:4px 10px;
  border-radius:6px;
  font-size:.68rem;
  font-weight:600;
  letter-spacing:.3px;
}

/* Description */
.card-body{padding:18px 18px 6px}
.card-desc{
  font-size:.88rem;
  font-weight:400;
  color:#888;
  line-height:1.75;
  display:-webkit-box;
  -webkit-line-clamp:4;
  -webkit-box-orient:vertical;
  overflow:hidden;
}

/* Actions */
.card-actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:14px 18px 18px;
}
.act-btn{
  font-family:'DM Sans',sans-serif;
  font-size:.8rem;
  font-weight:600;
  border-radius:10px;
  padding:13px 10px;
  cursor:pointer;
  transition:all .18s;
  display:flex;align-items:center;justify-content:center;gap:7px;
  -webkit-tap-highlight-color:transparent;
  letter-spacing:.2px;
}
.act-skip{
  background:#1f1f1f;
  border:1px solid #2a2a2a;
  color:#aaa;
}
.act-skip:hover{background:#252525;color:#fff}
.act-save{
  background:rgba(229,9,20,.12);
  border:1px solid rgba(229,9,20,.3);
  color:#e50914;
}
.act-save:hover{background:rgba(229,9,20,.22);border-color:#e50914}

/* ── WATCH LATER ── */
.wl-section{
  padding:0 20px 60px;
  max-width:420px;
  margin:0 auto;
  display:none;
}
.wl-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:16px;
  padding-bottom:14px;
  border-bottom:1px solid #1a1a1a;
}
.wl-title{font-size:1rem;font-weight:700}
.wl-title span{color:#e50914}
.wl-count{font-size:.72rem;color:#555;margin-top:2px;font-weight:500}
.wl-clear{
  font-family:'DM Sans',sans-serif;
  font-size:.7rem;font-weight:600;
  background:none;border:1px solid #222;
  border-radius:8px;color:#555;
  padding:7px 13px;cursor:pointer;
  transition:all .2s;
}
.wl-clear:hover{border-color:#e50914;color:#e50914}

.wl-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}
.wl-card{
  position:relative;border-radius:10px;
  overflow:hidden;cursor:pointer;
  border:1px solid #1a1a1a;
  transition:all .22s;
}
.wl-card:hover{transform:scale(1.03);border-color:#333;box-shadow:0 10px 32px rgba(0,0,0,.6)}
.wl-card img{
  width:100%;aspect-ratio:2/3;
  object-fit:cover;display:block;
  filter:brightness(.8);
  transition:filter .3s;
}
.wl-card:hover img{filter:brightness(1)}
.wl-card-info{
  position:absolute;bottom:0;left:0;right:0;
  padding:20px 8px 8px;
  background:linear-gradient(to top,rgba(0,0,0,.97),transparent);
}
.wl-card-name{
  font-size:.68rem;font-weight:600;
  line-height:1.25;
  display:-webkit-box;-webkit-line-clamp:2;
  -webkit-box-orient:vertical;overflow:hidden;
}
.wl-rm{
  position:absolute;top:6px;right:6px;
  width:22px;height:22px;
  background:rgba(0,0,0,.85);
  border:1px solid rgba(255,255,255,.1);
  border-radius:6px;color:#888;
  font-size:.55rem;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;opacity:0;transition:opacity .2s;
}
.wl-card:hover .wl-rm{opacity:1}
.wl-rm:hover{background:#e50914;border-color:#e50914;color:#fff}

/* ── ERROR ── */
.error{
  display:none;
  text-align:center;
  padding:36px 20px;
  max-width:420px;
  margin:0 auto;
}
.error-icon{font-size:2.5rem;margin-bottom:12px}
.error p{font-size:.85rem;color:#555;line-height:1.7}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(80px);
  background:#1c1c1c;
  border:1px solid #2a2a2a;
  border-left:3px solid #e50914;
  border-radius:10px;
  padding:12px 20px;
  font-size:.78rem;font-weight:600;
  color:#fff;z-index:9999;opacity:0;
  pointer-events:none;white-space:nowrap;
  transition:transform .38s cubic-bezier(0.34,1.56,0.64,1),opacity .3s;
}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* ── FOOTER ── */
footer{
  text-align:center;
  padding:20px 20px 32px;
  border-top:1px solid #141414;
}
footer p{font-size:.75rem;color:#444;font-weight:400}
footer a{color:#e50914;text-decoration:none;font-weight:600}
footer a:hover{opacity:.75}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">Cine<span>Pick</span></div>
  <div class="header-tag">TMDB Live</div>
</div>

<!-- HERO -->
<div class="hero">
  <span class="hero-emoji">🎬</span>
  <h1>What to watch<br/><em>tonight?</em></h1>
  <p>Stop scrolling. One tap picks your next movie or series.</p>
</div>

<!-- CONTROLS -->
<div class="controls">
  <div class="toggle-row">
    <button class="tog" data-t="movie">🎬 Films</button>
    <button class="tog on" data-t="both">⚡ Both</button>
    <button class="tog" data-t="tv">📺 Series</button>
  </div>
  <div class="genre-wrap">
    <select id="genreSel"><option value="">All Genres</option></select>
  </div>
  <button class="pick-btn" id="pickBtn">
    <span class="pick-btn-inner">
      <span class="pick-dice">🎲</span>
      Pick Something to Watch
    </span>
  </button>
</div>

<!-- LOADER -->
<div class="loader" id="loader">
  <div class="loader-dots">
    <span></span><span></span><span></span>
  </div>
  <p>Finding your pick...</p>
</div>

<!-- ERROR -->
<div class="error" id="errBox">
  <div class="error-icon">😕</div>
  <p>Couldn't load anything.<br/>Check your internet and try again.</p>
</div>

<!-- CARD -->
<div class="card-wrap">
  <div class="card" id="card">
    <div class="poster-wrap">
      <img id="poster" src="" alt=""/>
      <div class="poster-gradient"></div>
      <div class="poster-badge" id="pBadge">Film</div>
      <div class="poster-rating" id="pRating">⭐ —</div>
      <div class="poster-info">
        <div class="poster-title" id="pTitle">—</div>
        <div class="poster-tags" id="pTags"></div>
      </div>
    </div>
    <div class="card-body">
      <p class="card-desc" id="pDesc">—</p>
    </div>
    <div class="card-actions">
      <button class="act-btn act-skip" id="skipBtn">🔄 Not Interested</button>
      <button class="act-btn act-save" id="saveBtn">🔖 Save for Later</button>
    </div>
  </div>
</div>

<!-- WATCH LATER -->
<div class="wl-section" id="wlSec">
  <div class="wl-header">
    <div>
      <div class="wl-title">Watch <span>Later</span></div>
      <div class="wl-count" id="wlCount">0 titles</div>
    </div>
    <button class="wl-clear" id="wlClr">Clear All</button>
  </div>
  <div class="wl-grid" id="wlGrid"></div>
</div>

<!-- FOOTER -->
<footer>
  <p>Made with ♥️ by <a href="https://www.instagram.com/bettercallvrd?igsh=MWI0dm0xcDI4ZzVueA==" target="_blank">@bettercallvrd</a> · Powered by TMDB</p>
</footer>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
var API_KEY = "8feedecf4e862cc3a6924bddf383c666";
var IMG     = "https://image.tmdb.org/t/p/w500";
var BASE    = "https://api.themoviedb.org/3";

var MG = {28:"Action",18:"Drama",35:"Comedy",27:"Horror",878:"Sci-Fi",10749:"Romance",12:"Adventure",16:"Animation",80:"Crime",99:"Documentary",14:"Fantasy",36:"History",9648:"Mystery",10752:"War",37:"Western"};
var TG = {10759:"Action & Adventure",16:"Animation",35:"Comedy",80:"Crime",99:"Documentary",18:"Drama",10751:"Family",9648:"Mystery",10764:"Reality",10765:"Sci-Fi & Fantasy",37:"Western"};

var mode    = "both";
var current = null;
var lastId  = null;
var count   = 0;
var wl      = [];

try { wl = JSON.parse(localStorage.getItem("cp_wl4") || "[]"); } catch(e) { wl = []; }

// Elements
var pickBtn  = document.getElementById("pickBtn");
var skipBtn  = document.getElementById("skipBtn");
var saveBtn  = document.getElementById("saveBtn");
var loader   = document.getElementById("loader");
var errBox   = document.getElementById("errBox");
var card     = document.getElementById("card");
var poster   = document.getElementById("poster");
var pBadge   = document.getElementById("pBadge");
var pRating  = document.getElementById("pRating");
var pTitle   = document.getElementById("pTitle");
var pTags    = document.getElementById("pTags");
var pDesc    = document.getElementById("pDesc");
var genreSel = document.getElementById("genreSel");
var toast    = document.getElementById("toast");
var wlSec    = document.getElementById("wlSec");
var wlGrid   = document.getElementById("wlGrid");
var wlCount  = document.getElementById("wlCount");
var wlClr    = document.getElementById("wlClr");

// Build genres
function buildGenres() {
  genreSel.innerHTML = '<option value="">All Genres</option>';
  var map = mode === "tv" ? TG : MG;
  var keys = Object.keys(map).sort(function(a,b){ return map[a].localeCompare(map[b]); });
  keys.forEach(function(k) {
    var o = document.createElement("option");
    o.value = k; o.textContent = map[k];
    genreSel.appendChild(o);
  });
}
buildGenres();

// Toggle
document.querySelectorAll(".tog").forEach(function(btn) {
  btn.addEventListener("click", function() {
    document.querySelectorAll(".tog").forEach(function(b) { b.classList.remove("on"); });
    btn.classList.add("on");
    mode = btn.getAttribute("data-t");
    buildGenres();
  });
});

// Pick
function pick() {
  loader.style.display = "block";
  card.style.display   = "none";
  errBox.style.display = "none";

  var type  = mode === "both" ? (Math.random() > 0.5 ? "movie" : "tv") : mode;
  var genre = genreSel.value;
  var page  = Math.floor(Math.random() * 10) + 1;
  var url   = BASE + "/discover/" + type + "?api_key=" + API_KEY + "&language=en-US&page=" + page + "&vote_count.gte=50&sort_by=popularity.desc";
  if (genre) url += "&with_genres=" + genre;

  fetch(url)
    .then(function(res) {
      if (!res.ok) throw new Error(res.status);
      return res.json();
    })
    .then(function(data) {
      var results = (data.results || []).filter(function(r) {
        return r.poster_path && r.overview && r.vote_average > 0 && r.id !== lastId;
      });
      if (!results.length) throw new Error("empty");

      var item = results[Math.floor(Math.random() * results.length)];
      lastId   = item.id;
      current  = item;
      current.media_type = type;
      count++;
      display(item, type);
    })
    .catch(function(e) {
      console.error("CinePick error:", e);
      loader.style.display = "none";
      errBox.style.display = "block";
    });
}

function display(item, type) {
  loader.style.display = "none";

  var title  = item.title || item.name || "Unknown";
  var year   = (item.release_date || item.first_air_date || "").slice(0, 4);
  var rating = item.vote_average ? item.vote_average.toFixed(1) : "N/A";
  var tLabel = type === "movie" ? "Film" : "Series";
  var gmap   = type === "movie" ? MG : TG;

  poster.src       = IMG + item.poster_path;
  pBadge.textContent  = tLabel;
  pRating.textContent = "⭐ " + rating;
  pTitle.textContent  = title;
  pDesc.textContent   = item.overview || "No description available.";

  // Tags
  pTags.innerHTML = "";
  if (year) {
    var y = document.createElement("span");
    y.className = "tag"; y.textContent = year;
    pTags.appendChild(y);
  }
  (item.genre_ids || []).slice(0, 2).forEach(function(gid) {
    if (gmap[gid]) {
      var t = document.createElement("span");
      t.className = "tag"; t.textContent = gmap[gid];
      pTags.appendChild(t);
    }
  });

  // Save button state
  var saved = wl.some(function(x) { return x.id === item.id && x.media_type === type; });
  saveBtn.textContent = saved ? "✅ Saved!" : "🔖 Save for Later";

  card.style.display = "block";
  setTimeout(function() {
    card.scrollIntoView({ behavior: "smooth", block: "nearest" });
  }, 80);
}

// Buttons
pickBtn.addEventListener("click", pick);
skipBtn.addEventListener("click", pick);

saveBtn.addEventListener("click", function() {
  if (!current) return;
  var exists = wl.some(function(x) { return x.id === current.id && x.media_type === current.media_type; });
  if (exists) { showToast("Already saved! 📌"); return; }
  wl.push({ id: current.id, media_type: current.media_type, title: current.title || current.name, poster_path: current.poster_path });
  try { localStorage.setItem("cp_wl4", JSON.stringify(wl)); } catch(e) {}
  saveBtn.textContent = "✅ Saved!";
  showToast("Saved to Watch Later 🎬");
  renderWL();
});

wlClr.addEventListener("click", function() {
  wl = [];
  try { localStorage.removeItem("cp_wl4"); } catch(e) {}
  renderWL();
  showToast("Cleared!");
});

// Watch Later
function renderWL() {
  if (!wl.length) { wlSec.style.display = "none"; return; }
  wlSec.style.display = "block";
  wlCount.textContent = wl.length + " title" + (wl.length !== 1 ? "s" : "");
  wlGrid.innerHTML = "";
  wl.forEach(function(item, i) {
    var d = document.createElement("div");
    d.className = "wl-card";
    d.innerHTML = (item.poster_path
      ? '<img src="' + IMG + item.poster_path + '" alt="' + item.title + '" loading="lazy"/>'
      : '<div style="background:#1a1a1a;aspect-ratio:2/3;display:flex;align-items:center;justify-content:center;font-size:2rem">🎬</div>')
      + '<div class="wl-card-info"><div class="wl-card-name">' + item.title + '</div></div>'
      + '<button class="wl-rm">✕</button>';
    d.querySelector(".wl-rm").addEventListener("click", function(e) {
      e.stopPropagation();
      wl.splice(i, 1);
      try { localStorage.setItem("cp_wl4", JSON.stringify(wl)); } catch(e2) {}
      renderWL();
      showToast("Removed");
    });
    wlGrid.appendChild(d);
  });
}

// Toast
var toastTimer;
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { toast.classList.remove("show"); }, 2600);
}

// Init
renderWL();
</script>
