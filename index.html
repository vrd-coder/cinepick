<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CinePick 🎬</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'DM Sans',sans-serif;
  background:#0a0a0a;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.container{
  max-width:420px;
  width:100%;
  padding:20px;
  text-align:center;
}

h1{margin-bottom:5px}

.tagline{color:#888;margin-bottom:15px}

.controls{
  display:flex;
  gap:8px;
  justify-content:center;
  margin-bottom:10px;
}

select, button{
  background:#141414;
  border:1px solid #222;
  color:#fff;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
}

.main-btn{
  background:#ff0033;
  border:none;
  padding:14px;
  width:100%;
  margin-top:10px;
}

.card{
  background:#111;
  border-radius:16px;
  padding:15px;
  margin-top:20px;
  display:none;
  animation:fade 0.3s ease;
}

@keyframes fade{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}

img{width:100%;border-radius:10px}

.tag{
  background:#222;
  padding:4px 8px;
  margin:3px;
  border-radius:6px;
  display:inline-block;
  font-size:12px;
}

.actions{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.loader{color:#888;margin-top:10px}
</style>
</head>

<body>

<div class="container">

<h1>🎬 CinePick</h1>
<div class="tagline">Your next binge starts here 🔥</div>

<div class="controls">
  <select id="type">
    <option value="both">Both</option>
    <option value="movie">Movies</option>
    <option value="tv">TV Shows</option>
  </select>

  <select id="genre">
    <option value="">All Genres</option>
    <option value="28">Action</option>
    <option value="35">Comedy</option>
    <option value="18">Drama</option>
    <option value="27">Horror</option>
    <option value="878">Sci-Fi</option>
  </select>
</div>

<button class="main-btn" onclick="pick()">🎲 Surprise Me</button>

<div class="loader" id="loader"></div>

<div class="card" id="card">
  <img id="poster">
  <h3 id="title"></h3>
  <p id="meta"></p>
  <div id="genres"></div>
  <p id="desc"></p>

  <div class="actions">
    <button onclick="pick()">🔄</button>
    <button onclick="save()">❤️</button>
  </div>
</div>

</div>

<script>

const API_KEY = "8feedecf4e862cc3a6924bddf383c666";
const IMG = "https://image.tmdb.org/t/p/w500";

let current = null;

const genreMap = {
  28:"Action",35:"Comedy",18:"Drama",27:"Horror",878:"Sci-Fi"
};

async function pick(){

  document.getElementById("loader").innerText="Loading...";
  document.getElementById("card").style.display="none";

  try{

    let type = document.getElementById("type").value;
    let genre = document.getElementById("genre").value;

    if(type==="both"){
      type = Math.random()>0.5?"movie":"tv";
    }

    let url = `https://api.themoviedb.org/3/${type}/popular?api_key=${API_KEY}`;

    if(genre){
      url += `&with_genres=${genre}`;
    }

    const res = await fetch(url);
    const data = await res.json();

    const item = data.results[Math.floor(Math.random()*data.results.length)];
    current = item;

    document.getElementById("poster").src = IMG + item.poster_path;
    document.getElementById("title").innerText = item.title || item.name;
    document.getElementById("meta").innerText =
      "⭐ "+item.vote_average;

    let gHTML="";
    item.genre_ids.forEach(g=>{
      if(genreMap[g]){
        gHTML += `<span class="tag">${genreMap[g]}</span>`;
      }
    });

    document.getElementById("genres").innerHTML = gHTML;
    document.getElementById("desc").innerText = item.overview;

    document.getElementById("loader").innerText="";
    document.getElementById("card").style.display="block";

  }catch{
    document.getElementById("loader").innerText="Error 😢";
  }
}

function save(){
  let list = JSON.parse(localStorage.getItem("watchlist")) || [];
  list.push(current);
  localStorage.setItem("watchlist", JSON.stringify(list));
  alert("Saved ❤️");
}

</script>

</body>
</html>
